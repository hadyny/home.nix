name: "Check"
on:
  pull_request:
  push:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: DeterminateSystems/nix-installer-action@main
    - uses: DeterminateSystems/magic-nix-cache-action@main
    - name: Check flake
      run: nix flake check
    - name: Check formatting
      run: nix fmt -- --ci
    - name: Evaluate darwin config
      run: nix eval .#darwinConfigurations.Hadyns-MacBook-Pro.system --raw
    - name: Evaluate home-manager config
      run: nix eval .#homeConfigurations.hadyn.activationPackage --raw
    - name: Lint with statix
      run: nix run nixpkgs#statix -- check .
    - name: Check for dead code
      run: nix run nixpkgs#deadnix -- --fail .
