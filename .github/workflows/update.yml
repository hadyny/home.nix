name: "Update flake inputs"
on:
  schedule:
    - cron: "0 21 * * 0" # Weekly Monday 9am NZST
  workflow_dispatch:
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
    - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
    - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: nix-tools
        authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
    - run: nix flake update
    # NOTE: no in-job `nix flake check` — it can't evaluate these aarch64
    # configs on the x86_64-linux runner (foreign-platform IFD build via the
    # obsidian module). The bump PR is unvalidated here; review before merge, or
    # add a native (macOS) validation leg.
    - uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
      with:
        commit-message: "chore: update flake inputs"
        title: "chore: update flake inputs"
        branch: flake-update
        delete-branch: true
